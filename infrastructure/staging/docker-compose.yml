volumes:
    caddy_data: {}
    db: {}
    reports: {}
services:
    migrations:
        build: &build
            dockerfile: ./infrastructure/production/Dockerfile
            target: migrations
            context: ../..
        volumes: &volumes
            - db:/db/
            - reports:/reports/
    server:
        ports:
            - '8000:8000'
            - '8001:8001'
        build:
            <<: *build
            target: server
        environment:
            - MAIN_URL=main:8000
            - ADMIN_URL=admin:8000
            - WEB_HOSTNAME=:8000
            - WEB_REDIR_HOSTNAME=:8001
            - WEB_REDIR_TARGET=http://localhost:8000
        volumes:
            - caddy_data:/data/
    main: &main
        depends_on:
            migrations:
                condition: service_completed_successfully
        env_file:
            - .env
        environment:
            - PYTHONUNBUFFERED=1
            - ALLOWED_HOSTS=*
        build:
            <<: *build
            target: main
        volumes: *volumes
    admin:
        <<: *main
        environment:
            - PYTHONUNBUFFERED=1
            - ALLOWED_HOSTS=*
            - MAIN_URL=main:8000
    cron:
        <<: *main
        environment:
            - PYTHONUNBUFFERED=1
            - ALLOWED_HOSTS=*
            - MAIN_URL=main:8000
            - DRY_RUN=1
        build:
            <<: *build
            target: cron
